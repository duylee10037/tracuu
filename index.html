<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tra cứu số báo danh</title>
<style>
body{
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f5f5f5;
}
.box{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,0.1);
}
input{
    padding:12px;
    width:250px;
}
button{
    padding:12px 20px;
    background:#2E7D32;
    color:white;
    border:none;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="box">
    <h2>Tra cứu số báo danh</h2>
    <input type="text" id="keyword" placeholder="Nhập họ tên">
    <br><br>
    <button onclick="search()">Tra cứu</button>
</div>

<script>
async function search() {
    const keyword = document.getElementById("keyword").value;

    const res = await fetch("/api/tracuu", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ keyword })
    });

    const data = await res.json();

    if (data.success) {
        window.open(data.url, "_blank");
    } else {
        alert(data.error);
    }
}
</script>

</body>
</html>
