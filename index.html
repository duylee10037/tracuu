<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tra cứu số báo danh</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
  --green:#2E7D32;
  --green-light:#E8F5E9;
  --green-dark:#1B5E20;
}

body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#E8F5E9,#ffffff);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.container{
  max-width:700px;
  width:100%;
}

h1{
  font-family:'Outfit',sans-serif;
  color:var(--green-dark);
  margin-bottom:10px;
}

.card{
  background:white;
  padding:40px;
  border-radius:20px;
  box-shadow:0 20px 50px rgba(0,0,0,0.1);
}

input{
  width:100%;
  padding:15px;
  border-radius:15px;
  border:2px solid #ddd;
  margin-bottom:20px;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:40px;
  background:var(--green);
  color:white;
  cursor:pointer;
}

.result{
  margin-top:25px;
  display:none;
  padding:20px;
  border-radius:15px;
  background:var(--green-light);
}

.result button{
  margin-top:10px;
  background:var(--green-dark);
}
</style>
</head>
<body>

<div class="container">
  <h1>Tra cứu số báo danh</h1>

  <div class="card">
    <input type="text" id="keyword" placeholder="Nhập họ tên học sinh">
    <button onclick="search()">Tra cứu</button>

    <div class="result" id="resultBox"></div>
  </div>
</div>

<script>
async function search(){
  const keyword=document.getElementById("keyword").value.trim();
  const resultBox=document.getElementById("resultBox");

  if(!keyword){
    alert("Vui lòng nhập họ tên");
    return;
  }

  resultBox.style.display="none";

  const res=await fetch("/api/tracuu",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({keyword})
  });

  const data=await res.json();

  if(!data.success){
    alert(data.error);
    return;
  }

  // 🔹 Nếu nhiều người trùng tên
  if(data.multiple){
    let html="<h3>Chọn đúng học sinh:</h3>";
    data.list.forEach(id=>{
      html+=`<button onclick="loadDetail('${id}')">Xem ID ${id}</button><br><br>`;
    });
    resultBox.innerHTML=html;
    resultBox.style.display="block";
    return;
  }

  // 🔹 Nếu 1 người
  showDetail(data.data);
}

async function loadDetail(id){
  const res=await fetch("/api/tracuu",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({keyword:id})
  });

  const data=await res.json();
  if(data.success){
    showDetail(data.data);
  }
}

function showDetail(d){
  const resultBox=document.getElementById("resultBox");
  resultBox.innerHTML=`
    <h3>Kết quả chi tiết</h3>
    <p><b>Họ tên:</b> ${d.name}</p>
    <p><b>Số báo danh:</b> ${d.sbd}</p>
    <p><b>Lớp:</b> ${d.lop}</p>
    <p><b>Ngày sinh:</b> ${d.ngaysinh}</p>
    <hr>
    <p><b>Phòng:</b> ${d.phong}</p>
    <p><b>STT:</b> ${d.stt}</p>
  `;
  resultBox.style.display="block";
}
</script>

</body>
</html>
